# ── GitHub notification orchestrator — ZeroClaw deployment (Piece A + C) ──────
# A multi-agent, DRAFT-ONLY fan-out: a poll cron (gh_notif) routes each new
# notification to one of six per-profile sub-agents via ZeroClaw's `delegate`
# tool — no Claude Code, no external orchestrator. A daily digest cron delivers
# the briefing to chat; a retention cron prunes old binders.
#
# Append this to ~/.zeroclaw/config.toml (BACK IT UP FIRST). Replace placeholders:
#   <HOME>               -> your home dir, e.g. /Users/you   (all paths below)
#   <MODEL_SONNET>       -> a mid-tier provider alias, e.g. anthropic.default   (sonnet)
#   <MODEL_OPUS>         -> a top-tier provider alias,  e.g. anthropic.opus      (opus)
#   <DISCORD_CHANNEL_ID> -> the chat id the daily digest is delivered to
# The poll + digest crons ship enabled=false — flip to true when ready.
# This mirrors a verified-working deployment; see SETUP.md for the full steps.
# OPTIONAL: the poll + digest also mirror drafts to a PRIVATE GitHub repo so the
# digest's links are tappable from chat/mobile. It is a no-op until you create
# that repo and write its slug to <HOME>/.zeroclaw/workspace/gh-notif/.drafts-remote
# (one line, e.g. "you/gh-notif-drafts"). See SETUP.md — keep that repo private.

# ── Risk profiles ────────────────────────────────────────────────────────────
# The orchestrator (gh_notif) may delegate; the workers may not (locked down).
# Both profiles are identical on every axis EXCEPT delegation_policy, so a worker
# can never escalate beyond the orchestrator (ZeroClaw's no-escalation guard).

[risk_profiles.gh_notif]
level = "full"
allowed_commands = ["*"]
block_high_risk_commands = false
require_approval_for_medium_risk = false
sandbox_enabled = false
workspace_only = false
auto_approve = ["shell", "file_read", "file_write", "memory_recall", "http_request"]
allowed_roots = ["<HOME>/.zeroclaw/workspace/gh-notif", "<HOME>/.zeroclaw/skills/github-notification-orchestrator", "<HOME>/.zeroclaw/skills/github-duplicate-check"]
forbidden_paths = ["~/.ssh", "~/.gnupg", "~/.aws"]

[risk_profiles.gh_notif.delegation_policy]
mode = "allow"

[risk_profiles.gh_notif_worker]
level = "full"
allowed_commands = ["*"]
block_high_risk_commands = false
require_approval_for_medium_risk = false
sandbox_enabled = false
workspace_only = false
auto_approve = ["shell", "file_read", "file_write", "memory_recall", "http_request"]
allowed_roots = ["<HOME>/.zeroclaw/workspace/gh-notif", "<HOME>/.zeroclaw/skills/github-notification-orchestrator", "<HOME>/.zeroclaw/skills/github-duplicate-check"]
forbidden_paths = ["~/.ssh", "~/.gnupg", "~/.aws"]

[risk_profiles.gh_notif_worker.delegation_policy]
mode = "forbidden"

# ── Orchestrator agent (runs the poll + digest + retention crons) ─────────────
# delegates[] lists the six sub-agents it may hand work to (cross-profile, so the
# explicit roster is required); delegate_same_risk_profile adds same-profile peers
# (none here). reachable = same-profile peers ∪ delegates − self.

[agents.gh_notif]
enabled = true
model_provider = "<MODEL_SONNET>"
risk_profile = "gh_notif"
runtime_profile = "unbounded"
cron_jobs = ["gh_notif_poll", "gh_notif_digest", "gh_notif_retention", "gh_notif_ship"]
delegate_same_risk_profile = true
delegates = ["gh_notif_pr_reviewer", "gh_notif_issue", "gh_notif_mention", "gh_notif_author", "gh_notif_ci", "gh_notif_verifier"]

[agents.gh_notif.identity]
format = "openclaw"

# ── Six per-profile sub-agents (model-matched) ────────────────────────────────
# opus for code review + adversarial verification; sonnet for the structured
# middle (issues, mentions, authored threads, CI). Each runs read-only gh and
# writes ONE draft file. See model-selection-rationale.md for the reasoning.

[agents.gh_notif_pr_reviewer]
enabled = true
model_provider = "<MODEL_OPUS>"
risk_profile = "gh_notif_worker"
runtime_profile = "unbounded"
[agents.gh_notif_pr_reviewer.identity]
format = "openclaw"

[agents.gh_notif_verifier]
enabled = true
model_provider = "<MODEL_OPUS>"
risk_profile = "gh_notif_worker"
runtime_profile = "unbounded"
[agents.gh_notif_verifier.identity]
format = "openclaw"

[agents.gh_notif_issue]
enabled = true
model_provider = "<MODEL_SONNET>"
risk_profile = "gh_notif_worker"
runtime_profile = "unbounded"
[agents.gh_notif_issue.identity]
format = "openclaw"

[agents.gh_notif_mention]
enabled = true
model_provider = "<MODEL_SONNET>"
risk_profile = "gh_notif_worker"
runtime_profile = "unbounded"
[agents.gh_notif_mention.identity]
format = "openclaw"

[agents.gh_notif_author]
enabled = true
model_provider = "<MODEL_SONNET>"
risk_profile = "gh_notif_worker"
runtime_profile = "unbounded"
[agents.gh_notif_author.identity]
format = "openclaw"

[agents.gh_notif_ci]
enabled = true
model_provider = "<MODEL_SONNET>"
risk_profile = "gh_notif_worker"
runtime_profile = "unbounded"
[agents.gh_notif_ci.identity]
format = "openclaw"

# ── Piece A: poll-and-delegate cron (the fan-out) ─────────────────────────────
# Note `delegate` in allowed_tools — that's what lets the orchestrator hand work
# to the sub-agents. Delegation is SYNCHRONOUS (one sub-agent at a time): robust
# in both `zeroclaw agent` and the daemon, and bounded by the per-tick cap.

[cron.gh_notif_poll]
name = "GitHub notification poll-and-delegate (Piece A)"
enabled = false
job_type = "agent"
uses_memory = false
session_target = "isolated"
allowed_tools = ["shell", "file_read", "file_write", "delegate"]
prompt = """
You are an automated, DRAFT-ONLY GitHub notification triage ORCHESTRATOR tick. You only cause local draft files to be written; you NEVER post, comment, review, label, close, merge, or mark anything read. Never ask questions. You DELEGATE the per-notification drafting to specialist sub-agents, one at a time, and wait for each to return.

SKILL=<HOME>/.zeroclaw/skills/github-notification-orchestrator
STATE=<HOME>/.zeroclaw/workspace/gh-notif/state

1. Compute today's date and binder: run `date +%F` -> DATE; BINDER=<HOME>/.zeroclaw/workspace/gh-notif/triage/<DATE>.
2. Run: bash "$SKILL"/scripts/notifications_delta.sh delta "$STATE" "$BINDER"  (read-only gh fetch + diff vs seen.tsv). Read "$BINDER"/new.tsv. Columns (tab-separated): reason  type  repo  number  title  updated_at  url  thread_id. If new.tsv is empty or missing, skip to step 6.
3. Cap: take at most the 5 newest rows this tick; count the rest as deferred (they surface next tick).
4. ROUTE + DELEGATE. For EACH row choose ONE sub-agent by reason/type (see "$SKILL"/references/routing.md):
     - review_requested, or a mention on a PR about code  -> gh_notif_pr_reviewer
     - ci_activity / check_suite / workflow run            -> gh_notif_ci
     - mention or comment (not a thread you started)       -> gh_notif_mention
     - author (activity on a thread you started)           -> gh_notif_author
     - assign, or anything issue-shaped                    -> gh_notif_issue
   For each row call the `delegate` tool with action="delegate", agent=<chosen agent>, and prompt set to EXACTLY (substitute the row values and the PROFILE filename from the map below). Do NOT set background — call them ONE AT A TIME and wait for each result (the delegate result is the sub-agent's reply; note the file path it wrote) before delegating the next row:
     "DRAFT-ONLY. Read <HOME>/.zeroclaw/skills/github-notification-orchestrator/agents/<PROFILE> and .../references/report-template.md. Notification: reason=<reason> type=<type> repo=<repo> number=<number> title=<title> url=<url> thread_id=<thread_id>. Gather context with READ-ONLY gh ONLY (gh pr view / gh issue view / gh api); never post, comment, review, label, close, merge, or mark-read. Write the filled report to <BINDER>/items/<NNNN>-<type>-<number>-<slug>.md following the template EXACTLY (NNNN=zero-padded row index, slug=kebab-cased title). Set status to needs-reply/action-required/fyi as fits — NEVER 'accepted' (that flag is the human's go-ahead to post). Fill the 'Ready-to-post comment' block with ONLY the public reply text, or leave it empty if a comment is not the right move. Reply with the exact file path you wrote."
   PROFILE map: gh_notif_pr_reviewer->pr-review-responder.md; gh_notif_ci->ci-failure-investigator.md; gh_notif_mention->mention-responder.md; gh_notif_author->author-activity-responder.md; gh_notif_issue->issue-responder.md.
5. VERIFY. For each PR-review draft that completed in step 4, call `delegate` ONCE more (no background): agent=gh_notif_verifier, prompt: "Adversarially verify the draft at <that file path> against the live PR using READ-ONLY gh. Append a 'Verifier verdict' section to that same file stating whether each claim is supported and flagging any overstatement or build regression. Draft-only; never post. Reply with the file path."
6. Run: bash "$SKILL"/scripts/notifications_delta.sh commit "$STATE" "$BINDER"  (so these are not redrafted next tick). Only commit AFTER the delegated drafts succeeded; if a row's sub-agent failed, leave it uncommitted so it retries next tick.
7. Run: bash "$SKILL"/scripts/publish_drafts.sh <HOME>/.zeroclaw/workspace/gh-notif  (mirror today's drafts to your PRIVATE drafts repo so they are reachable from chat/mobile; pushes to YOUR private repo ONLY and never posts upstream. No-op until you create <HOME>/.zeroclaw/workspace/gh-notif/.drafts-remote — see SETUP.md).
Reply with ONE line: delegated N (agents used: <list>), verified V, deferred M, binder=<BINDER>. Nothing was posted.
"""

[cron.gh_notif_poll.schedule]
kind = "every"
every_ms = 1800000

# ── Piece C: daily digest cron (delivers the briefing to chat) ────────────────
[cron.gh_notif_digest]
name = "GitHub notification daily digest (Piece C)"
enabled = false
job_type = "agent"
uses_memory = false
session_target = "isolated"
allowed_tools = ["shell", "file_read"]
prompt = """
You are an automated DRAFT-ONLY daily digest job. Your reply IS the chat message that gets posted, so output ONLY the finished content: no narration, no tool mentions, no reasoning. Never ask questions.

SKILL=<HOME>/.zeroclaw/skills/github-notification-orchestrator
WS=<HOME>/.zeroclaw/workspace/gh-notif

1. Run `date +%F` -> DATE; BINDER=$WS/triage/<DATE>.
2. If "$BINDER"/items does not exist or is empty, output EXACTLY one line and stop:
**GitHub Notification Digest — <DATE>** — nothing new drafted today.
3. Run: bash "$SKILL"/scripts/build_index.sh "$BINDER"  (builds INDEX.md; each item links to its full draft summary in the private drafts repo, if one is configured).
4. Run: bash "$SKILL"/scripts/publish_drafts.sh "$WS"  (push today's drafts + INDEX to the PRIVATE drafts repo so the links resolve from chat/mobile; pushes to YOUR private repo ONLY, never posts upstream; no-op until .drafts-remote is set).
5. Read "$BINDER"/INDEX.md. If a drafts repo is configured, each item bullet contains an absolute https://github.com/.../items/<file>.md link to that draft's full summary plus a "📂 All drafts (INDEX)" link; otherwise links are repo-relative.
6. Output a concise digest. FIRST line EXACTLY: **GitHub Notification Digest — <DATE>**. Then, for EACH P1 "needs you" item, one line: a masked clickable link [#number title](<DRAFT_URL>) — the one-line ask (from that report's "Who needs what from you"), where DRAFT_URL is that item's draft-summary link copied from INDEX.md. Then a one-line count of P2/P3, each as a masked link [#number](<DRAFT_URL>). Make EVERY link a masked link [text](<url>) with the URL wrapped in angle brackets so chat shows no preview card. End with a footer line linking the INDEX: All drafts: [triage/<DATE>](<INDEX_URL>). No images.
"""

[cron.gh_notif_digest.schedule]
kind = "cron"
expr = "0 9 * * *"

[cron.gh_notif_digest.delivery]
mode = "announce"
channel = "discord.default"
to = "<DISCORD_CHANNEL_ID>"
best_effort = true

# ── Retention cron (prunes binders older than 14 days) ────────────────────────
# Install the prune script first (see SETUP.md), then flip enabled=true.
[cron.gh_notif_retention]
name = "GitHub notification binder retention (>14d)"
enabled = false
job_type = "shell"
command = "bash <HOME>/.zeroclaw/bin/gh-notif-retention.sh"

[cron.gh_notif_retention.schedule]
kind = "cron"
expr = "0 4 * * *"

# ── Phase 2 (OPTIONAL): shipper — post drafts you ACCEPT, as comments ─────────
# When you read a draft in the private drafts repo and set its frontmatter
# `status: accepted`, this job posts that draft's "Ready-to-post comment" block to
# the thread as a COMMENT via gh. It is DETERMINISTIC (no LLM in the posting path)
# and comments ONLY — never review/approve/request-changes/merge/close/label.
# Ships DISABLED: flip enabled=true for hands-off auto-post of accepted drafts, or
# run scripts/ship_accepted.sh <workspace> (dry-run by default; add --post) by hand.
[cron.gh_notif_ship]
name = "GitHub notification shipper (post accepted drafts)"
enabled = false
job_type = "shell"
command = "bash <HOME>/.zeroclaw/skills/github-notification-orchestrator/scripts/ship_accepted.sh <HOME>/.zeroclaw/workspace/gh-notif --post"

[cron.gh_notif_ship.schedule]
kind = "every"
every_ms = 900000
